spring.application.name=product-crud-assignment
server.port=8080
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/product_db}
spring.datasource.username=${DB_USERNAME:postgres}
# Set DB_PASSWORD locally when PostgreSQL requires password authentication.
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
